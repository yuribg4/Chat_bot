<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChatBot IA</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <div class="contenedor">
    <header class="encabezado">
      <div class="avatar">🤖</div>
      <div>
        <h1>ChatBot IA</h1>
        <span class="estado">● En línea</span>
      </div>
    </header>

    <div id="chat" class="chat-caja">
      <div class="mensaje bot">
        <span class="burbuja">¡Hola! Soy tu asistente virtual. ¿En qué puedo ayudarte hoy?</span>
      </div>
    </div>

    <div class="entrada">
      <input
        type="text"
        id="mensaje"
        placeholder="Escribe tu mensaje..."
        autocomplete="off"
        onkeydown="if(event.key==='Enter') enviarMensaje()"
      />
      <button onclick="enviarMensaje()">Enviar</button>
    </div>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
